name: Validate package repo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths:
      - ".github/workflows/build-repos.yml"
      - "scripts/**"
      - "packages/**"
      - "package-lists/**"
      - "metadata/**"
      - "pkgbuilds/**"
      - "aur-and-custom-packages.md"
      - "README.md"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell syntax
        run: bash -n scripts/*.sh

      - name: Validate workflow YAML
        run: ruby -e 'require "yaml"; YAML.load_file(".github/workflows/build-repos.yml"); puts "ok"'

      - name: Validate package list format
        run: |
          set -euo pipefail
          normalized="$(
            sed -E 's/#.*$//' package-lists/access-os-extra.txt \
              | awk '{$1=$1; if (NF) print $0}'
          )"
          duplicates="$(printf '%s\n' "${normalized}" | sort | uniq -d)"
          if [[ -n "${duplicates}" ]]; then
            echo "Duplicate packages found in package-lists/access-os-extra.txt:"
            printf '%s\n' "${duplicates}" | sed 's/^/  - /'
            exit 1
          fi

      - name: Validate Arch repo scripts
        run: |
          set -euo pipefail
          docker run --rm \
            -e GITHUB_REPOSITORY_OWNER \
            -e GITHUB_REPOSITORY \
            -v "$GITHUB_WORKSPACE:/work" \
            -w /work \
            archlinux:latest \
            bash -lc '
              set -euo pipefail
              pacman-key --init
              pacman-key --populate archlinux
              if ! grep -q "^[[:space:]]*\\[multilib\\]" /etc/pacman.conf; then
                printf "\n[multilib]\nInclude = /etc/pacman.d/mirrorlist\n" >>/etc/pacman.conf
              fi
              pacman -Syu --noconfirm --needed archlinux-keyring base-devel git curl jq pacman-contrib
              export REMOVED_AUR_JSON=/tmp/removed-from-aur.json
              export REMOVED_AUR_TXT=/tmp/removed-from-aur.txt
              ./scripts/sync-removed-from-aur.sh
              ./scripts/check-updates.sh >/tmp/check-updates.log
              ./scripts/rebuild.sh --dry-run
              ./scripts/gen-manifest.sh >/tmp/manifest.json
              jq -e ".version == 1 and (.repos | type == \"object\")" /tmp/manifest.json >/dev/null
            '

      - name: Validate local publish script help
        run: bash scripts/publish-local.sh --help
